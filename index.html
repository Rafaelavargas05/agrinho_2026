<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agro Forte</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>AGRO FORTE</h1>
    <p>Força que vem da terra 🌱</p>
  </header>

  <section class="gallery">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854" alt="Plantação">
      <p>Produção sustentável</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1500595046743-cd271d694d30" alt="Trator">
      <p>Tecnologia no campo</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1464226184884-fa280b87c399" alt="Colheita">
      <p>Colheita de qualidade</p>
    </div>
  </section>

  <section class="filters">
    <h2>Filtros VSCO</h2>
    <button onclick="setFilter('none')">Normal</button>
    <button onclick="setFilter('warm')">Quente</button>
    <button onclick="setFilter('green')">Verde</button>
    <button onclick="setFilter('fade')">Desbotado</button>
  </section>

  <footer>
    <p>© 2026 Agro Forte</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
